<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handleliste</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
    <header>
        <h1>Handleliste</h1>
        <div class="controls">
            <button id="themeToggle">Dark</button>
            <input type="color" id="bgPicker" title="Velg bakgrunn">
        </div>
    </header>

    <form id="form">
        <input id="input" type="text" placeholder="Legg til vare..." autocomplete="off">
        <button type="submit">Legg til</button>
        <button type="button" id="resetBtn">Nullstill</button>
    </form>

    <section>
        <ul id="list"></ul>
        <div id="stats"></div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
